# ============================================================
# UstaTop — Docker Compose
# ------------------------------------------------------------
# Ishga tushirish:
#   docker compose up --build
#
# Birinchi marta ishga tushirilganda migratsiyalar avtomatik
# qo'llanadi (Dockerfile CMD orqali). Namunaviy ma'lumotlarni
# yuklash uchun alohida:
#   docker compose exec api npm run prisma:seed
# ============================================================

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ustatop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ustatop
      POSTGRES_PASSWORD: ustatop_password
      POSTGRES_DB: ustatop_db
    ports:
      - '5432:5432'
    volumes:
      - ustatop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ustatop -d ustatop_db']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ustatop-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ustatop:ustatop_password@postgres:5432/ustatop_db?schema=public
      JWT_SECRET: ${JWT_SECRET:ali12345ali12345ali12345ali12345}
      JWT_EXPIRES_IN: 7d
      TELEGRAM_BOT_TOKEN: ${8726745749:AAER6BdfmzO5hpFZu81Y_rTUeK3NsVg1fHo}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - '4000:4000'

volumes:
  ustatop_pg_data:
